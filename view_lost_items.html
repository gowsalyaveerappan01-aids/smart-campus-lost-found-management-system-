<!DOCTYPE html>
<html>
<head>
    <title>View Lost Items</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <h2>Lost Items List</h2>

    <table border="1">
        <tr>
            <th>Item Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Location</th>
            <th>Date Lost</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item['item_name'] }}</td>
            <td>{{ item['category'] }}</td>
            <td>{{ item['description'] }}</td>
            <td>{{ item['location'] }}</td>
            <td>{{ item['date_lost'] }}</td>
            <td>{{ item['status'] }}</td>
            <td>
                <a href="{{ url_for('delete_lost_item', item_id=item['lost_id']) }}"
                    onclick="return confirm('Are you sure you want to delete this item?')">
                    <button>Delete</button>
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
